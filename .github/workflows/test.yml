name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # Python tests job
  test-python:
    name: Python Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio pytest-timeout

      - name: Run Python tests
        run: |
          cd tests
          pytest -v --tb=short --cov=client --cov-report=xml --cov-report=term-missing

      - name: Upload Python coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./tests/coverage.xml
          flags: python
          name: codecov-python-${{ matrix.python-version }}
          fail_ci_if_error: false

  # API tests job
  test-api:
    name: API Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20', '22']
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: |
          cd api
          npm ci

      - name: Run API tests
        run: |
          cd api
          npm run test -- --run --coverage --reporter=verbose

      - name: Upload API coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./api/coverage/coverage-final.json
          flags: api
          name: codecov-api-${{ matrix.node-version }}
          fail_ci_if_error: false

  # Dashboard tests job
  test-dashboard:
    name: Dashboard Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20', '22']
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: |
          cd dashboard
          npm ci

      - name: Run Dashboard tests
        run: |
          cd dashboard
          npm run test -- --run --coverage --reporter=verbose

      - name: Upload Dashboard coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./dashboard/coverage/coverage-final.json
          flags: dashboard
          name: codecov-dashboard-${{ matrix.node-version }}
          fail_ci_if_error: false

  # Integration tests job
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-python, test-api, test-dashboard]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: agents_manager_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          npm install
          cd api && npm ci && cd ..
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio

      - name: Run integration tests
        run: |
          npm run test:integration
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/agents_manager_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      - name: Upload integration coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./tests/integration/coverage/coverage-final.json
          flags: integration
          name: codecov-integration
          fail_ci_if_error: false

  # Coverage aggregation job
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [test-python, test-api, test-dashboard, test-integration]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate coverage summary
        run: |
          echo "# Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Coverage reports have been uploaded to Codecov." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View detailed reports at: https://codecov.io/github/${{ github.repository }}" >> $GITHUB_STEP_SUMMARY

      - name: Check coverage thresholds
        run: |
          echo "Coverage thresholds check would go here"
          echo "This can be customized to enforce minimum coverage requirements"

  # Build verification job
  build:
    name: Build Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          cd api && npm ci && cd ..
          cd dashboard && npm ci && cd ..

      - name: Build API
        run: |
          cd api
          npm run build

      - name: Build Dashboard
        run: |
          cd dashboard
          npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            api/dist
            dashboard/dist
          retention-days: 7

  # Final status check
  status:
    name: Test Status
    runs-on: ubuntu-latest
    needs: [test-python, test-api, test-dashboard, test-integration, build]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test-python.result }}" != "success" ] || \
             [ "${{ needs.test-api.result }}" != "success" ] || \
             [ "${{ needs.test-dashboard.result }}" != "success" ] || \
             [ "${{ needs.test-integration.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "::error::One or more test jobs failed"
            exit 1
          fi
          echo "All tests passed successfully!"

      - name: Update status summary
        run: |
          echo "# Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python Tests | ${{ needs.test-python.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Tests | ${{ needs.test-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dashboard Tests | ${{ needs.test-dashboard.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.test-integration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
