[pytest]
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test discovery patterns
testpaths = client/tests tests/unit tests/integration tests/e2e

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    -ra
    -l
    --cov=client
    --cov=api
    --cov-report=term-missing
    --cov-report=html:htmlcov-python
    --cov-report=xml:coverage-python.xml
    --cov-report=json:coverage-python.json
    --cov-fail-under=0

# Environment configuration
env_files =
    tests/.env.test
    client/tests/.env.test

# Test execution options
timeout = 30
timeout_method = thread

# Markers for test categorization
markers =
    # Test type markers
    unit: Unit tests (fast, isolated tests)
    integration: Integration tests (require external services)
    e2e: End-to-end tests (full workflow tests)

    # Speed markers
    slow: Slow running tests (take > 1 second)

    # Dependency markers
    database: Tests requiring database access
    api: Tests requiring API server
    http: Tests making HTTP requests
    agents: Tests requiring agent services

    # Feature markers
    daemon: Tests for daemon client functionality
    approval: Tests for approval workflow
    kanban: Tests for kanban workflow functionality

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warning handling
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning
